name: Build Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [ windows-latest ]
    
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          
      - name: Setup WIX Toolset (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          # Download and install WIX Toolset
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile "wix314-binaries.zip"
          Expand-Archive -Path "wix314-binaries.zip" -DestinationPath "C:\WixTools314"
          # Add WIX to PATH
          $env:PATH += ";C:\WixTools314"
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
        shell: pwsh
        
      - name: Install dependencies
        run: npm install --verbose
        timeout-minutes: 15
      
      - name: Build
        run: npm run tauri build --verbose
        timeout-minutes: 15
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: src-tauri/target/release/bundle/
